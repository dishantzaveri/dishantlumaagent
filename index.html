<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk to Dishant's Twin</title>

  <!-- LiveKit JS client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

  <style>
    /* ── Fonts ──────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --accent:    #7c6af7;
      --accent2:   #c084fc;
      --text:      #e2e2f0;
      --muted:     #6b6b8a;
      --success:   #34d399;
      --danger:    #f87171;
      --glow:      rgba(124, 106, 247, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background grid ────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Main card ──────────────────────────────────────────── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: min(420px, 92vw);
      text-align: center;
      box-shadow: 0 0 80px rgba(124,106,247,0.08), 0 24px 48px rgba(0,0,0,0.4);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Avatar ─────────────────────────────────────────────── */
    .avatar-ring {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
    }

    .avatar-ring svg.spinner {
      position: absolute;
      inset: -6px;
      width: calc(100% + 12px);
      height: calc(100% + 12px);
      animation: spin 3s linear infinite;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .avatar-ring svg.spinner.active { opacity: 1; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.2), transparent 65%);
    }

    /* Pulse rings during speaking */
    .pulse-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    .pulse-ring:nth-child(2) { animation-delay: 0.2s; }
    .pulse-ring:nth-child(3) { animation-delay: 0.4s; }

    .speaking .pulse-ring {
      animation: pulse-out 1.8s ease-out infinite;
    }

    @keyframes pulse-out {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0;   transform: scale(1.6); }
    }

    /* ── Text ───────────────────────────────────────────────── */
    .name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Status bar ─────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      min-height: 20px;
      transition: color 0.3s;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-bar.connected .status-dot { background: var(--success); }
    .status-bar.connected { color: var(--success); }
    .status-bar.listening .status-dot { background: var(--accent); animation: blink 1s infinite; }
    .status-bar.listening { color: var(--accent); }
    .status-bar.speaking .status-dot  { background: var(--accent2); animation: blink 0.5s infinite; }
    .status-bar.speaking { color: var(--accent2); }
    .status-bar.error .status-dot { background: var(--danger); }
    .status-bar.error { color: var(--danger); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Visualizer bars ─────────────────────────────────────── */
    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 32px;
      margin-bottom: 28px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .visualizer.active { opacity: 1; }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--accent), var(--accent2));
      height: 4px;
      transition: height 0.1s;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 0 32px var(--glow);
    }

    .btn-end {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.25);
      margin-top: 12px;
    }

    .btn-end:hover { background: rgba(248, 113, 113, 0.2); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── Transcript ──────────────────────────────────────────── */
    .transcript {
      margin-top: 20px;
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      display: none;
    }

    .transcript.visible { display: block; }
    .transcript .line-agent { color: var(--accent2); }
    .transcript .line-user  { color: var(--text); }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="card">
  <div class="avatar-ring" id="avatarRing">
    <!-- Spinning dashed ring (shows while active) -->
    <svg class="spinner" id="spinnerSvg" viewBox="0 0 112 112" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="56" cy="56" r="52"
        stroke="url(#grad)" stroke-width="2"
        stroke-dasharray="12 8" stroke-linecap="round"/>
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c6af7"/>
          <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="avatar" id="avatarEl">
      <!-- Pulse rings -->
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <!-- Initials — change "D" to your initial -->
      D
    </div>
  </div>

  <!-- Change to your name & tagline -->
  <div class="name">Dishant's AI Twin</div>
  <div class="tagline">Powered by LiveKit · GPT-4o mini · Deepgram</div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Click to start a conversation</span>
  </div>

  <!-- Audio level visualizer -->
  <div class="visualizer" id="visualizer">
    <div class="bar" id="b1"></div>
    <div class="bar" id="b2"></div>
    <div class="bar" id="b3"></div>
    <div class="bar" id="b4"></div>
    <div class="bar" id="b5"></div>
    <div class="bar" id="b6"></div>
    <div class="bar" id="b7"></div>
    <div class="bar" id="b8"></div>
    <div class="bar" id="b9"></div>
  </div>

  <button class="btn-primary btn-start" id="startBtn" onclick="startSession()">
    🎙️ &nbsp; Talk to Dishant
  </button>

  <button class="btn-primary btn-end" id="endBtn" onclick="endSession()" style="display:none">
    End conversation
  </button>

  <!-- Rolling transcript -->
  <div class="transcript" id="transcript"></div>

  <div class="footer">
    Built with <a href="https://livekit.io" target="_blank">LiveKit</a> ·
    <a href="https://deepgram.com" target="_blank">Deepgram</a> ·
    <a href="https://openai.com" target="_blank">OpenAI</a>
  </div>
</div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────
  // Change this to wherever your FastAPI token server is running
  const TOKEN_SERVER_URL = "http://localhost:8000/token";

  // ── STATE ────────────────────────────────────────────────────────────────
  let room = null;
  let audioContext = null;
  let analyser = null;
  let vizInterval = null;

  // ── UI HELPERS ───────────────────────────────────────────────────────────
  const statusBar   = document.getElementById("statusBar");
  const statusText  = document.getElementById("statusText");
  const startBtn    = document.getElementById("startBtn");
  const endBtn      = document.getElementById("endBtn");
  const avatarEl    = document.getElementById("avatarEl");
  const spinnerSvg  = document.getElementById("spinnerSvg");
  const visualizer  = document.getElementById("visualizer");
  const transcript  = document.getElementById("transcript");
  const bars        = [...document.querySelectorAll(".bar")];

  function setStatus(state, text) {
    statusBar.className = `status-bar ${state}`;
    statusText.textContent = text;
  }

  function addTranscriptLine(speaker, text) {
    transcript.classList.add("visible");
    const line = document.createElement("div");
    line.className = speaker === "agent" ? "line-agent" : "line-user";
    line.textContent = `${speaker === "agent" ? "→" : "←"} ${text}`;
    transcript.appendChild(line);
    transcript.scrollTop = transcript.scrollHeight;
  }

  // ── VISUALIZER ───────────────────────────────────────────────────────────
  function startVisualizer(stream) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser     = audioContext.createAnalyser();
    analyser.fftSize = 64;
    const src    = audioContext.createMediaStreamSource(stream);
    src.connect(analyser);

    const data   = new Uint8Array(analyser.frequencyBinCount);
    visualizer.classList.add("active");

    vizInterval = setInterval(() => {
      analyser.getByteFrequencyData(data);
      bars.forEach((bar, i) => {
        const val = data[i * 2 + 2] || 0;
        bar.style.height = `${4 + (val / 255) * 28}px`;
      });
    }, 50);
  }

  function stopVisualizer() {
    clearInterval(vizInterval);
    visualizer.classList.remove("active");
    bars.forEach(b => b.style.height = "4px");
    if (audioContext) { audioContext.close(); audioContext = null; }
  }

  // ── MAIN FUNCTIONS ───────────────────────────────────────────────────────
  async function startSession() {
    startBtn.disabled = true;
    setStatus("", "Connecting...");
    spinnerSvg.classList.add("active");

    try {
      // 1. Get token from your FastAPI server
      const resp = await fetch(TOKEN_SERVER_URL);
      if (!resp.ok) throw new Error(`Token server error: ${resp.status}`);
      const { token, ws_url } = await resp.json();

      // 2. Connect to LiveKit room
      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
      });

      // 3. Wire up room events
      room.on(LivekitClient.RoomEvent.Connected, async () => {
        setStatus("connected", "Connected — start speaking!");
        startBtn.style.display = "none";
        endBtn.style.display   = "block";

        // Publish microphone
        await room.localParticipant.setMicrophoneEnabled(true);
        const micTrack = room.localParticipant.getTrackPublications()
          .find(p => p.kind === LivekitClient.Track.Kind.Audio);

        if (micTrack?.track?.mediaStream) {
          startVisualizer(micTrack.track.mediaStream);
        }
      });

      room.on(LivekitClient.RoomEvent.Disconnected, () => {
        setStatus("", "Conversation ended");
        stopVisualizer();
        spinnerSvg.classList.remove("active");
        avatarEl.classList.remove("speaking");
        startBtn.style.display = "block";
        startBtn.disabled = false;
        endBtn.style.display = "none";
      });

      // Agent speaking = remote audio track subscribed
      room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          track.attach();   // plays through speakers
          setStatus("speaking", "Dishant is speaking...");
          avatarEl.classList.add("speaking");

          track.on("ended", () => {
            setStatus("listening", "Listening...");
            avatarEl.classList.remove("speaking");
          });
        }
      });

      // Transcription (if enabled in LiveKit agent)
      room.on(LivekitClient.RoomEvent.TranscriptionReceived, (segments, participant) => {
        segments.forEach(seg => {
          if (seg.final) {
            const isAgent = participant?.identity?.startsWith("agent") || !participant;
            addTranscriptLine(isAgent ? "agent" : "user", seg.text);
          }
        });
      });

      room.on(LivekitClient.RoomEvent.ConnectionStateChanged, state => {
        if (state === LivekitClient.ConnectionState.Reconnecting) {
          setStatus("", "Reconnecting...");
        }
      });

      await room.connect(ws_url, token);

    } catch (err) {
      console.error("Connection error:", err);
      setStatus("error", `Error: ${err.message}`);
      startBtn.disabled = false;
      spinnerSvg.classList.remove("active");
    }
  }

  async function endSession() {
    if (room) {
      await room.disconnect();
      room = null;
    }
  }

  // Cleanup on page close
  window.addEventListener("beforeunload", () => {
    if (room) room.disconnect();
  });
</script>
</body>
</html>
